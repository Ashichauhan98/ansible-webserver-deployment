---
- name: Deploy Apache Web Server
  hosts: webservers
  become: yes

  tasks:
    - name: Update package cache
      apt:
        update_cache: yes

    - name: Install Apache
      apt:
        name: apache2
        state: present

    - name: Start Apache service
      service:
        name: apache2
        state: started
        enabled: yes

    - name: Create custom homepage
      copy:
        dest: /var/www/html/index.html
        content: |
          <html>
          <body>
            <h1>Automated Web Server Deployment using Ansible</h1>
            <h2>Created by Ashi Chauhan</h2>
          </body>
          </html>
